<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for the document -->
    <meta charset="UTF-8">
    <!-- Viewport settings for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title of the web page -->
    <title>CoffeeMan.Hell</title>
    <!-- Favicon for the web page -->
    <link rel="icon" href="assets/images/coffeeman.png" type="image/x-icon">
    <!-- Link to the external CSS stylesheet -->
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <!-- Semi-transparent overlay for the background -->
    <div class="overlay"></div>
    
    <!-- Background video element -->
    <video id="backgroundVideo" loop muted>
        <!-- Source for the video -->
        <source src="assets/images/cola.mp4" type="video/mp4">
    </video>
    
    <!-- Main container for the primary content -->
    <div class="container" id="main-page">
        <!-- Main heading of the page -->
        <h1>CoffeeMan.Hell</h1>
        <!-- Subheading or tagline -->
        <p>More Coffee?</p>
        
        <!-- Discord status section -->
        <div class="discord-status">
            <!-- Link to Discord profile -->
            <a href="https://discord.com/users/406416295349714944" target="_blank">
                <!-- Discord status image -->
                <img src="https://lanyard-profile-readme.vercel.app/api/406416295349714944?bg=00000050&borderRadius=7px&idleMessage=No coffee and exhausted&hideBadges=true&showDisplayName=true" alt="Discord Status">
            </a>
        </div>
        
        <!-- Container for the buttons -->
        <div class="button-container">
            <!-- Link to join Discord server -->
            <a href="https://discord.gg/SxWKF4HsSY" target="_blank" class="custom-button"><span>Join Our Discord Server</span></a>
            <!-- Link to Wallpaper Engine Projects -->
            <a href="https://steamcommunity.com/sharedfiles/filedetails/?id=2489782244" target="_blank" class="custom-button"><span>Wallpaper Engine Projects</span></a>
            <!-- Link to GitHub -->
            <a href="https://github.com/CoffeemanHell" target="_blank" class="custom-button"><span>GitHub</span></a>
            <!-- Link to show the About page -->
            <a href="#" onclick="showPage('about'); return false;" class="custom-button"><span>About</span></a>
        </div>
    </div>
    
    <!-- Container for the About page content, initially hidden -->
    <div class="container" id="about-page" style="display: none;">
        <!-- Heading for the About page -->
        <h1>About CoffeeMan.Hell</h1>
        <!-- Content for the About page -->
        <p>This is the about page content.</p>
        
        <!-- Container for the buttons on the About page -->
        <div class="button-container">
            <!-- Link to go back to the main page -->
            <a href="#" onclick="showPage('main'); return false;" class="custom-button"><span>Back to Main</span></a>
        </div>
    </div>
    
    <!-- Button to toggle background and music -->
    <button id="toggleButton" class="minimal-button" aria-label="Toggle background and music"></button>
    
    <!-- Background music element -->
    <audio id="backgroundMusic" src="assets/sound/cola.mp3" loop></audio>
    
    <!-- Link to the external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
